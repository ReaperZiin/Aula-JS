<body>
    <h1>Integrando os recursos de interatividade do JS</h1>
    <hr>
    <script>
        let num1 = window.prompt("Digite o primeiro número: ");
        num1 = parseFloat(num1)
        let num2 = window.prompt("Digite o segundo número: ");
        num2 = parseFloat(num2)
        let operacao = window.prompt("Digite operação + ou - ");
        if (operacao == "+") {
            let resultado = num1 + num2
            window.alert(resultado);
        }else if (operacao == "-") {
            let resultado = num1 - num2
            window.alert(resultado);
        } else{
            window.alert("Operação invalida!")
        }


    </script>
